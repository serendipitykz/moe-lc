<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoE &amp; Long Context — ACM Class 2026</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    /* ── Slide system: html-ppt runtime uses .is-active to show the active slide ── */
    .deck .slide          { display: none !important; min-height: 100vh; }
    .deck .slide.is-active{ display: flex !important; }

    /* ── Progress bar (auto-created by runtime.js) ── */
    .progress-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px; background: rgba(255,255,255,.07); z-index: 100;
    }
    .progress-bar span {
      display: block; height: 100%; background: #818cf8;
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }

    /* ── Notes overlay (N key) ── */
    .notes-overlay {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 38vh; overflow-y: auto;
      background: rgba(9,11,19,.96); color: #d1d5db;
      padding: 20px 64px 28px; font-size: 15px; line-height: 1.8;
      z-index: 200; display: none;
      border-top: 1px solid rgba(99,102,241,.35);
      backdrop-filter: blur(16px);
    }
    .notes-overlay.is-open { display: block; }

    /* ── Overview grid (O key) ── */
    .overview {
      position: fixed; inset: 0; background: rgba(0,0,0,.92);
      z-index: 300; display: none; overflow-y: auto;
      padding: 40px; gap: 20px; flex-wrap: wrap; align-content: start;
    }
    .overview.is-open { display: flex; }
    .overview .thumb {
      background: #1f2937; border: 1px solid #374151; border-radius: 10px;
      padding: 16px 20px; cursor: pointer; flex: 0 0 180px;
      transition: border-color .15s;
    }
    .overview .thumb:hover { border-color: #6366f1; }
    .overview .thumb.is-active { border-color: #818cf8; background: #1e1b4b; }
    .overview .thumb .n { font-size: 20px; font-weight: 700; color: #6366f1; font-family: monospace; }
    .overview .thumb .t { font-size: 12px; color: #9ca3af; margin-top: 4px; line-height: 1.4; }

    /* ── Hide speaker notes from audience view ── */
    aside.notes { display: none !important; }

    /* ── Keyboard hint badge (bottom-right) ── */
    #kbd-hint {
      position: fixed; bottom: 14px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; color: #4b5563; font-family: monospace;
      letter-spacing: .05em; pointer-events: none; user-select: none;
      z-index: 50;
    }
  </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden">

  <!-- Slide container: .deck is required by html-ppt runtime.js -->
  <div id="slide-container" class="deck">
<!-- SLIDES_PLACEHOLDER -->
  </div>

  <!-- Keyboard hint -->
  <div id="kbd-hint">← → navigate · S presenter · N notes · O overview · F fullscreen</div>

  <!-- html-ppt runtime: keyboard nav + S presenter mode + O overview + N notes -->
  <script src="../assets/runtime.js"></script>

  <!-- MathJax: retypeset whenever a new slide becomes active -->
  <script>
    (function () {
      function retypeset(el) {
        if (window.MathJax && MathJax.typesetPromise) {
          MathJax.typesetPromise([el]).catch(console.error);
        }
      }
      const observer = new MutationObserver(function (mutations) {
        for (const m of mutations) {
          if (m.attributeName === 'class' && m.target.classList.contains('is-active')) {
            retypeset(m.target);
          }
        }
      });
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.deck .slide').forEach(function (s) {
          observer.observe(s, { attributes: true, attributeFilter: ['class'] });
        });
        const first = document.querySelector('.deck .slide.is-active');
        if (first) retypeset(first);
      });
    })();
  </script>
</body>
</html>

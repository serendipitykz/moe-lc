<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ALiBi Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; color: #818cf8; }
    video {
      width: min(90vw, 1280px);
      border-radius: 12px;
      border: 1px solid #374151;
      background: #000;
    }
    .back-btn {
      padding: 10px 28px;
      background: #1f2937;
      color: #d1d5db;
      border: 1px solid #374151;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .back-btn:hover { background: #374151; }
  </style>
</head>
<body>
  <h1>ALiBi: Attention with Linear Biases</h1>
  <video src="alibi.mp4" controls autoplay></video>
  <a class="back-btn" href="../index.html#/16">← Back to slides</a>
</body>
</html>
